services:
  web:
    build:
      context: .
      dockerfile: Dockerfile-web
    container_name: bible-web
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/www
    depends_on:
      - db
      - composer
  db:
    image: mysql:8.0
    container_name: bible-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bible
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
  composer:
    build:
      context: .
      dockerfile: Dockerfile-composer
    container_name: bible-composer
    volumes:
      - ./:/app
    working_dir: /app
    command: composer install --no-dev --optimize-autoloader
    depends_on:
      - db
volumes:
  db_data:
